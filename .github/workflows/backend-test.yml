name: Backend Test & Lint

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shunfa
          POSTGRES_PASSWORD: shunfa
          POSTGRES_DB: shunfa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shunfa -d shunfa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov httpx

      - name: Run migration smoke test
        env:
          DEEPSEEK_API_KEY: test_key
          WECHAT_APP_ID: test_app
          WECHAT_APP_SECRET: test_secret
          JWT_SECRET_KEY: test_secret_key_123456789
          API_KEY_ENCRYPTION_SECRET: test_encryption_secret_1234567890
          POSTGRES_TEST_DATABASE_URL: postgresql://shunfa:shunfa@localhost:5432/shunfa_test
        run: |
          pytest tests/test_migrations.py -v

      - name: Run tests with coverage
        env:
          DEEPSEEK_API_KEY: test_key
          WECHAT_APP_ID: test_app
          WECHAT_APP_SECRET: test_secret
          JWT_SECRET_KEY: test_secret_key_123456789
          API_KEY_ENCRYPTION_SECRET: test_encryption_secret_1234567890
        run: |
          pytest -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./backend/coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install linting tools
        # Pin ruff so CI and local runs agree on import-sorting rules.
        run: pip install 'ruff==0.15.17' mypy types-python-dateutil

      - name: Run ruff (linting)
        run: |
          ruff check app/ tests/ --output-format=github

      - name: Run ruff (formatting check)
        run: |
          ruff format --check app/ tests/

      - name: Run mypy (type checking)
        run: |
          mypy app/ --ignore-missing-imports
