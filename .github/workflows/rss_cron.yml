name: RSS Hot Topic Fetch

on:
  schedule:
    - cron: '0 0,12 * * *'  # 每天 08:00 和 20:00 CST (UTC+8)
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run RSS cron
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          BITABLE_HOT_TOPIC_TABLE_ID: ${{ secrets.BITABLE_HOT_TOPIC_TABLE_ID }}
          BITABLE_VOICE_RECORD_TABLE_ID: ${{ secrets.BITABLE_VOICE_RECORD_TABLE_ID }}
          JWT_SECRET_KEY: placeholder
          COZE_PLUGIN_TOKEN: placeholder
        run: cd backend && python -m app.cron.rss_cron
